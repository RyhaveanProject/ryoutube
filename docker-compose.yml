version: "3.9"
services:
  backend:
    build: ./backend
    container_name: ryhavean-yt-backend
    restart: unless-stopped
    ports:
      - "8001:8001"
    env_file:
      - ./backend/.env
    depends_on:
      - mongo
  mongo:
    image: mongo:7
    container_name: ryhavean-yt-mongo
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    ports:
      - "27017:27017"

volumes:
  mongo_data:
